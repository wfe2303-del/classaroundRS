<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>정산 매칭 보드</title>
  <link rel="stylesheet" href="./src/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <section id="loginSection" class="login-screen">
    <div class="login-card">
      <img class="login-logo" src="./assets/classaround-logo.png" alt="ClassAround" />
      <button id="googleLoginBtn" class="btn btn-primary login-google-btn" type="button">Google 계정으로 로그인</button>
      <div id="loginStatus" class="auth-error"></div>
    </div>
  </section>

  <div id="appSection" class="app-shell hidden">
    <header class="topbar topbar-app">
      <div class="brand-wrap">
        <img class="brand-logo" src="./assets/classaround-logo.png" alt="ClassAround" />
        <div>
          <h1 class="app-title">정산 매칭 보드</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <span id="userBadge" class="topbar-user hidden"></span>
        <button id="exportBtn" class="btn" type="button">정리표 저장</button>
        <button id="logoutBtn" class="btn" type="button">로그아웃</button>
      </div>
    </header>

    <main class="app-grid">
      <section class="card">
        <div class="section-row">
          <strong>강사 탭</strong>
          <div id="coachTabs" class="tabs"></div>
          <div class="right actions-inline">
            <button id="addCoachBtn" class="btn" type="button">추가</button>
            <button id="removeCoachBtn" class="btn btn-danger" type="button">삭제</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-row wrap-row">
          <strong>결제자 기준</strong>
          <select id="countMode" class="input-select">
            <option value="tx" selected>결제 건수</option>
            <option value="uniq">고유 전화번호</option>
          </select>
          <select id="sheetSelect" class="input-select sheet-select"></select>
          <span id="statusPill" class="status-pill">대기</span>
        </div>
      </section>

      <section class="card">
        <div class="section-row">
          <strong>신청자 명단</strong>
          <div class="right actions-inline">
            <input id="applicantsFile" type="file" accept=".xlsx,.xls,.csv" />
            <button id="runBtn" class="btn btn-primary" type="button">매칭 실행</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-row">
          <strong>현황</strong>
          <span id="summaryBadge" class="status-pill">-</span>
        </div>

        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>유입 경로</th>
                <th class="num">결제</th>
                <th class="num">트래킹</th>
                <th class="num">전환율</th>
                <th class="num">금액 합계</th>
                <th class="num">금액 비중</th>
              </tr>
            </thead>
            <tbody id="dashTbody">
              <tr><td colspan="6" class="empty-row">결제자 시트를 선택해 주세요.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="charts2">
          <div class="chart-card">
            <div class="section-row compact"><strong id="donutTitle">결제 비중</strong></div>
            <div class="donut-wrap">
              <canvas id="donutCanvas" width="320" height="260"></canvas>
              <div class="donut-center">
                <div class="donut-center-label">총액</div>
                <div class="donut-center-value" id="donutTotal">-</div>
              </div>
            </div>
            <div id="donutLegend" class="donut-legend"></div>
          </div>

          <div class="chart-card">
            <div class="section-row compact"><strong id="analysisTitle">분석표</strong></div>
            <div id="barsWrap" class="bars"></div>
          </div>
        </div>

        <div class="sub-card">
          <div class="section-row compact">
            <strong>전화번호 누락 명단</strong>
            <span id="missingPhoneBadge" class="status-pill mono">-</span>
            <span id="missingPhoneSumBadge" class="status-pill mono">-</span>
          </div>
          <div class="table-card">
            <table>
              <thead>
                <tr>
                  <th style="width:70px">No</th>
                  <th>이름</th>
                  <th class="num">금액</th>
                  <th class="mono">원본(전화)</th>
                  <th class="mono">행</th>
                </tr>
              </thead>
              <tbody id="missingPhoneTbody">
                <tr><td colspan="5" class="empty-row">결제자 시트를 선택해 주세요.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
