<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>정산 매칭 대시보드</title>
  <link rel="stylesheet" href="./src/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="app-header">
    <div class="topbar">
      <div>
        <h1>정산 매칭 대시보드</h1>
        <p id="currentSourceLabel" class="subtle"></p>
      </div>
      <div class="top-actions">
        <div id="userBadge" class="user-badge hidden"></div>
        <button id="syncPayersBtn" class="hidden">결제자 동기화</button>
        <button id="exportBtn" class="secondary hidden">정리표 저장</button>
        <button id="logoutBtn" class="secondary hidden">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section id="loginSection" class="login-shell">
      <div class="login-card">
        <h2>Google 계정으로 로그인해 주세요</h2>
        <p class="login-copy">권한 확인 후 결제자 시트를 읽어옵니다.</p>
        <div id="googleLoginBtn"></div>
        <div class="login-actions">
          <button id="requestAccessBtn" class="secondary hidden">시트 권한 승인</button>
        </div>
        <p id="loginStatus" class="status-text"></p>
      </div>
    </section>

    <section id="appSection" class="hidden app-grid">
      <section class="card">
        <div class="section-row">
          <strong>강사 탭</strong>
          <div id="coachTabs" class="tabs"></div>
          <div class="right actions-inline">
            <button id="addCoachBtn" class="secondary">추가</button>
            <button id="removeCoachBtn" class="danger">삭제</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-row wrap-row">
          <strong>결제자 기준</strong>
          <select id="countMode">
            <option value="tx" selected>결제 건수</option>
            <option value="uniq">고유 전화번호</option>
          </select>
          <select id="sheetSelect" class="sheet-select"></select>
          <span id="statusPill" class="badge">대기</span>
        </div>
      </section>

      <section class="card">
        <div class="section-row">
          <strong>신청자 명단</strong>
          <div class="right actions-inline">
            <input id="applicantsFile" type="file" accept=".xlsx,.xls,.csv" />
            <button id="runBtn">매칭 실행</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="section-row">
          <strong>현황</strong>
          <span id="summaryBadge" class="badge">-</span>
        </div>

        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>유입 경로</th>
                <th class="num">결제</th>
                <th class="num">트래킹</th>
                <th class="num">전환율</th>
                <th class="num">금액 합계</th>
                <th class="num">금액 비중</th>
              </tr>
            </thead>
            <tbody id="dashTbody">
              <tr><td colspan="6" class="empty-row">결제자 동기화 후 진행해 주세요.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="charts2">
          <div class="chart-card">
            <div class="section-row compact"><strong id="donutTitle">결제 비중</strong></div>
            <div class="donut-wrap">
              <canvas id="donutCanvas" width="320" height="260"></canvas>
              <div class="donut-center">
                <div class="donut-center-label">총액</div>
                <div class="donut-center-value" id="donutTotal">-</div>
              </div>
            </div>
            <div id="donutLegend" class="donut-legend"></div>
          </div>

          <div class="chart-card">
            <div class="section-row compact"><strong id="analysisTitle">분석표</strong></div>
            <div id="barsWrap" class="bars"></div>
          </div>
        </div>

        <div class="sub-card">
          <div class="section-row compact">
            <strong>전화번호 누락 명단</strong>
            <span id="missingPhoneBadge" class="badge mono">-</span>
            <span id="missingPhoneSumBadge" class="badge mono">-</span>
          </div>
          <div class="table-card">
            <table>
              <thead>
                <tr>
                  <th style="width:70px">No</th>
                  <th>이름</th>
                  <th class="num">금액</th>
                  <th class="mono">원본(전화)</th>
                  <th class="mono">행</th>
                </tr>
              </thead>
              <tbody id="missingPhoneTbody">
                <tr><td colspan="5" class="empty-row">결제자 시트를 먼저 불러와 주세요.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
